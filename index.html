<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NormaLIES — A Noir Detective Mystery. Investigate the Dégrasse mansion and solve the case.">
    <title>NormaLIES — A Detective Mystery</title>
    <link rel="stylesheet" href="./src/css/start.css">
    
    <!-- Core Services for Session Management -->
    <script src="./src/js/core/gamestate.js"></script>
    <script src="./src/js/core/inventory.js"></script>
</head>
<body>

    <!-- Atmospheric Background -->
    <div class="start-bg"></div>
    <div class="vignette"></div>

    <!-- ── Main Menu ─────────────────────────── -->
    <div class="start-container" id="start-menu">
        <div class="title-group">
            <p class="title-label">EduBytes presents</p>
            <h1 class="title-main">
                NormaLIES
                <span>A Noir Detective Mystery</span>
            </h1>
            <div class="title-divider"></div>
        </div>

        <div class="btn-group">
            <button class="btn-noir btn-play" id="btn-resume" onclick="resumeGame()" style="display: none; border-color: #c8860a;">
                <span class="btn-icon">➡</span>
                Resume
            </button>
            <button class="btn-noir btn-play" id="btn-play" onclick="startGame()">
                <span class="btn-icon">▶</span>
                New Game
            </button>
            <button class="btn-noir" id="btn-chapters" onclick="openChapters()">
                <span class="btn-icon">☰</span>
                Chapters
            </button>
            <button class="btn-noir" id="btn-restart-main" onclick="confirmRestartMain()" style="display: none; color: #e74c3c; border-color: rgba(231, 76, 60, 0.3);">
                <span class="btn-icon">↻</span>
                Reset Progress
            </button>
        </div>

        <p class="start-footer">Chapter 1 — Now Available</p>
    </div>

    <!-- ── Chapter Select Overlay ────────────── -->
    <div class="chapter-overlay" id="chapter-overlay">
        <div class="chapter-backdrop" onclick="closeChapters()"></div>
        <div class="chapter-panel">
            <div class="chapter-header">
                <h2>Select Chapter</h2>
                <div class="chapter-header-line"></div>
            </div>

            <div class="chapter-list" id="chapter-list">
                <!-- Chapters are injected by JS -->
            </div>

            <button class="btn-back" onclick="closeChapters()">
                ← Back
            </button>
        </div>
    </div>

    <script>
        /* ── Chapter Data ──────────────────────── */
        const chapters = [
            { num: 1, title: "Arriving at the Mansion",         available: true  },
            { num: 2, title: "Scene of the Crime",              available: false },
            { num: 3, title: "With Help of the Nanny",          available: false },
            { num: 4, title: "Let the Chips Fall Where They May", available: false },
            { num: 5, title: "Confluence",                      available: false },
            { num: 6, title: "Revelation",                      available: false },
        ];

        let selectedChapter = null;

        /* ── Check if save data exists ─────────── */
        function hasSaveData() {
            return localStorage.getItem('edubytes_gamestate') !== null;
        }

        /* ── Render chapter list ───────────────── */
        function renderChapters() {
            const list = document.getElementById('chapter-list');
            list.innerHTML = chapters.map(ch => {
                const cls   = ch.available ? 'available' : 'locked';
                const status = ch.available
                    ? '<span class="chapter-status playable">▶ Play Now</span>'
                    : '<span class="chapter-status coming-soon">Coming Soon</span>';
                const lock  = ch.available ? '' : '<span class="chapter-lock">🔒</span>';
                const click = ch.available ? `onclick="selectChapter(${ch.num})"` : '';

                return `
                    <div class="chapter-item ${cls}" ${click}>
                        <div class="chapter-num">${ch.num}</div>
                        <div class="chapter-info">
                            <div class="chapter-title">Chapter ${ch.num}: ${ch.title}</div>
                            ${status}
                        </div>
                        ${lock}
                    </div>`;
            }).join('');
        }

        /* ── Navigation ────────────────────────── */
        function startGame() {
            doLaunch();
        }

        function resumeGame() {
            const lastRoom = localStorage.getItem('edubytes_last_room');
            if (lastRoom) {
                doLaunch('./src/rooms/' + lastRoom);
            } else {
                doLaunch();
            }
        }

        function selectChapter(num) {
            selectedChapter = num;
            doLaunch();
        }

        function doLaunch(url = './src/rooms/outside.html') {
            closeChapters();
            document.body.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = url;
            }, 1000);
        }

        function openChapters() {
            document.getElementById('chapter-overlay').classList.add('active');
        }

        function closeChapters() {
            document.getElementById('chapter-overlay').classList.remove('active');
        }

        /* ── Keyboard support ──────────────────── */
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeChapters();
            }
        });

        function confirmRestartMain() {
            if(confirm("Are you sure you want to restart? All your progress in the investigation will be lost forever.")) {
                if (window.GameState && window.GameState.reset) {
                    window.GameState.reset();
                }
                
                if (window.Inventory && window.Inventory.reset) {
                    window.Inventory.reset();
                }
                
                renderChapters();
                updateUIState();
            }
        }

        function updateUIState() {
            const hasData = hasSaveData();
            document.getElementById('btn-restart-main').style.display = hasData ? 'flex' : 'none';
            document.getElementById('btn-resume').style.display = (hasData && localStorage.getItem('edubytes_last_room')) ? 'flex' : 'none';
            
            // Change "Play" button text if resuming is possible
            const playBtn = document.getElementById('btn-play');
            if (hasData) {
                playBtn.innerHTML = '<span class="btn-icon">▶</span> New Game';
            } else {
                playBtn.innerHTML = '<span class="btn-icon">▶</span> Play';
            }
        }

        /* ── Init ──────────────────────────────── */
        renderChapters();
        updateUIState();
    </script>
    <script src="./src/js/components/dynamic_loading.js"></script>
</body>
</html>
