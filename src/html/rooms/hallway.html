<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hallway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/rooms.css">
    <style>
        .room-background { background-image: url('../../assets/rooms/hallway.png'); }
        #obj-mirror { top: 10%; left: 5%; width: 25%; height: 45%; }
        #obj-clock  { top: 20%; left: 0%; width: 15%; height: 75%; }
        #obj-leduc  {
            top: 35%; left: 18%; width: 15%; height: 55%;
        }
    </style>
</head>
<body>
<div class="room-background"></div>
<h1>Hallway</h1>

<div class="interactable-layer">
    <div id="obj-clock"  class="clickable-object" onclick="showInteraction('clock')"  title="Grandfather Clock"></div>
    <div id="obj-mirror" class="clickable-object" onclick="showInteraction('mirror')" title="Mirror"></div>
    <div id="obj-leduc"  class="clickable-object" onclick="showInteraction('leduc')"  title="Jeanne-Paul Leduc"></div>
</div>

<div id="dialog-container"></div>

<!-- Navigation — per Interacties met locaties.docx -->
<!-- Left  → Living Room (always open) -->
<button class="btn btn-primary ui-button position-fixed top-50 start-0 translate-middle-y ms-3"
        id="btn-left" onclick="goToLocation('living_room.html')"><</button>

<!-- Right → Nursery (no condition — X per Interacties met locaties.docx) -->
<button class="btn btn-primary ui-button position-fixed top-50 end-0 translate-middle-y me-3"
        id="btn-right" onclick="goToLocation('nursery.html')">></button>

<!-- Up → Crime Scene (hidden until Butler unlocks it; shown via showBtn:btn-top) -->
<button class="btn btn-primary ui-button position-fixed top-0 start-50 translate-middle-x mt-3"
        id="btn-top" style="display:none;" onclick="goToLocation('crime_scene.html')">^</button>

<!-- Down → Outside (always open) -->
<button class="btn btn-primary ui-button position-fixed bottom-0 start-50 translate-middle-x mb-3"
        id="btn-bottom" onclick="goToLocation('outside.html')">v</button>

<script src="../../js/services/gamestate.js"></script>
<script src="../../js/services/responsive.js"></script>
<script src="../../js/components/device_block.js"></script>
<script src="../../js/components/movement.js"></script>
<script src="../../js/components/audio.js"></script>
<script src="../../js/components/game_menu.js"></script>
<script src="../../js/components/tablet_widget.js"></script>
<script src="../../js/services/inventory.js"></script>
<script src="../../js/components/inventory_ui.js"></script>
<script src="../../js/data/dialogs.js"></script>
<script src="../../js/components/dialog.js"></script>
<script src="../../js/components/dynamic_loading.js"></script>
<script>
    // Restore crime scene button if flag was already set (e.g. returning to hallway)
    document.addEventListener('DOMContentLoaded', () => {
        if (window.GameState && window.GameState.hasFlag('crime_scene_unlocked')) {
            const btn = document.getElementById('btn-top');
            if (btn) btn.style.display = 'flex';
        }
    });
</script>
</body>
</html>
