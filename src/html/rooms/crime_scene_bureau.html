<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Desk Close-up - EduBytes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/rooms.css">
    <style>
        .room-background { background-image: url('../../assets/rooms/crime_scene_bureau_USB.png'); }
        .room-background.no-usb { background-image: url('../../assets/rooms/crime_scene_bureau.png') !important; }
        
        #usb-hitbox {
            position: absolute;
            top: 65%; left: 65%; width: 30%; height: 30%;
            cursor: pointer;
            z-index: 1000;
            /* border: 1px dashed rgba(255,255,255,0.5); */ /* Uncomment to see hitbox */
        }
    </style>
</head>
<body>

    <div class="room-background"></div>
    
    <div class="interactable-layer">
        <div id="usb-hitbox" class="clickable-object" onclick="pickupUSB()" title="Take USB Stick"></div>
    </div>

    <!-- UI Buttons -->
    <button class="btn btn-primary ui-button position-fixed bottom-0 start-50 translate-middle-x mb-4" id="btn-bottom" onclick="goToLocation('crime_scene.html')"></button>

    <script src="../../js/services/gamestate.js"></script>
    <script src="../../js/services/routing_guard.js"></script>
    <script src="../../js/services/responsive.js"></script>
    <script src="../../js/components/device_block.js"></script>
    <script src="../../js/components/movement.js"></script>
    <script src="../../js/components/audio.js"></script>
    <script src="../../js/components/game_menu.js"></script>
    <script src="../../js/components/tablet_widget.js"></script>
    <script src="../../js/services/inventory.js"></script>
    <script src="../../js/components/inventory_ui.js"></script>
    <script src="../../js/data/dialogs.js"></script>
    <script src="../../js/components/dialog.js"></script>
    <script src="../../js/components/dynamic_loading.js"></script>
    <script>
        function updateRoomState() {
            const bg = document.querySelector('.room-background');
            const hitbox = document.getElementById('usb-hitbox');
            
            console.log("[Bureau] Updating room state. Has USB:", Inventory.hasItem('usb_stick'));

            if (Inventory.hasItem('usb_stick')) {
                bg.classList.add('no-usb');
                // Fallback direct style setting for GitHub Pages persistence
                bg.style.backgroundImage = "url('../../assets/rooms/crime_scene_bureau.png')";
                
                if (hitbox) hitbox.style.display = 'none';
                
                console.log("[Bureau] USB found logic applied.");

                // Force sync to update ambient background
                setTimeout(() => { 
                    if(window.ResponsiveScaler) {
                        console.log("[Bureau] Syncing ambient background...");
                        window.ResponsiveScaler.sync(); 
                    }
                }, 150);
            } else {
                bg.classList.remove('no-usb');
                if (hitbox) hitbox.style.display = 'block';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            console.log("[Bureau] DOMContentLoaded fired.");
            updateRoomState();
            
            // Debug: Log all clicks to help find coordinates
            window.addEventListener('click', (e) => {
                const layer = document.querySelector('.interactable-layer');
                if (layer) {
                    const rect = layer.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width) * 100;
                    const y = ((e.clientY - rect.top) / rect.height) * 100;
                    console.log(`Click Coordinates -> left: ${x.toFixed(2)}%, top: ${y.toFixed(2)}%`);
                }
            });
        });

        function pickupUSB() {
            console.log("[Bureau] pickupUSB() clicked.");
            if (Inventory.addItem('usb_stick')) {
                console.log("[Bureau] Item added successfully.");
                updateRoomState();

                if (window.showDialog) {
                    window.showDialog("You found a USB stick on the desk. It might contain important data.");
                } else if (window.DialogEngine) {
                    window.DialogEngine.playSequence([
                        { speaker: "Detective", text: "Ow, let's look at the tablet" }
                    ]);
                }
            } else {
                console.warn("[Bureau] addItem failed - item already in inventory.");
            }
        }
    </script>
</body>
</html>
