<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Living Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/rooms.css">
    <style>
        .room-background { 
            background-image: url('../../assets/rooms/living_room_closed.png'); 
            transition: background-image 0.5s ease-in-out;
        }
        #obj-piano  { top: 38%; left: 55%; width: 40%; height: 45%; }
        #obj-door   { top: 25%; left: 42%; width: 14%; height: 35%; }
        #obj-thomas { top: 35%; left: 30%; width: 15%; height: 58%; }
    </style>
</head>
<body>
<div class="room-background"></div>
<h1>Living Room</h1>

<div class="interactable-layer">
    <div id="obj-piano"  class="clickable-object" onclick="showInteraction('piano')" title="Grand Piano"></div>
    <div id="obj-door"   class="clickable-object" onclick="handleDoorClick()"        title="Nanny's Room Door"></div>
    <div id="obj-thomas" class="clickable-object" onclick="showInteraction('thomas')" title="Thomas Souvellier"></div>
</div>

<div id="dialog-container"></div>

<!-- Navigation — per Interacties met locaties.docx -->
<!-- Right → Hallway (always open) -->
<button class="btn btn-primary ui-button position-fixed top-50 end-0 translate-middle-y me-3"
        id="btn-right" onclick="goToLocation('hallway.html')">></button>

<!-- Small Up button near door → Nanny's Room (requires nannys_key) -->
<!-- Positioned near the center background door area -->
<button class="btn btn-secondary ui-button position-fixed"
        id="btn-top"
        style="display: none; top: 20%; left: 44.5%; width: 36px; height: 36px; font-size: 0.9rem;"
        onclick="goToLocation('nannys_room.html', 'nannys_key')">^</button>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Persistence: Check if door was already unlocked
        if (window.GameState && window.GameState.hasFlag('nannys_room_unlocked')) {
            const bg = document.querySelector('.room-background');
            if (bg) bg.style.backgroundImage = "url('../../assets/rooms/living_room_open.png')";
            
            const btn = document.getElementById('btn-top');
            if (btn) btn.style.display = 'flex';

            // Hide the door hitbox since it's already open
            const doorHitbox = document.getElementById('obj-door');
            if (doorHitbox) doorHitbox.style.display = 'none';
        }
    });

    function handleDoorClick() {
        if (window.Inventory && window.Inventory.hasItem('nannys_key')) {
            showInteraction('door_nannys_room_unlocked');
        } else {
            showInteraction('door_nannys_room');
        }
    }
</script>

<script src="../../js/services/gamestate.js"></script>
<script src="../../js/services/responsive.js"></script>
<script src="../../js/components/device_block.js"></script>
<script src="../../js/components/movement.js"></script>
<script src="../../js/components/audio.js"></script>
<script src="../../js/components/game_menu.js"></script>
<script src="../../js/components/tablet_widget.js"></script>
<script src="../../js/services/inventory.js"></script>
<script src="../../js/components/inventory_ui.js"></script>
<script src="../../js/data/dialogs.js"></script>
<script src="../../js/components/dialog.js"></script>
<script src="../../js/components/dynamic_loading.js"></script>
</body>
</html>
