
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>room movement buttons</title>
</head>
<body>







<!--het gedeelte onder deze comment dient toegevoegd te worden op elke pagina waartussen je zou kunnen bewegen,-->
<!--in de "cons rooms" dien je de verschillende rooms te declareren-->







<!--Room navigatie Knoppen -->
<button onclick="previousRoom()"><</button>
<button onclick="nextRoom()">></button>

<script>
    const rooms = [
        "room_movement.html",
        "nursery.html"
        /// voeg hier alle paginas toe waartussen je kan bewegen
    ];

    // Zoek in welke pagina (room) we momenteel zitten
    let currentIndex = rooms.findIndex(room =>
        window.location.href.includes(room) // checkt of de URL deze bestandsnaam bevat
    );

    // Functie om naar de volgende pagina te gaan
    function nextRoom() {
        // +1 = volgende pagina
        // % rooms.length = zorgt dat we terug naar het begin gaan als we op het einde zitten
        let nextIndex = (currentIndex + 1) % rooms.length;
        const target = rooms[nextIndex];
        if (window.EduBytesNavigation && typeof window.EduBytesNavigation.allowRoomNavigation === 'function') {
            window.EduBytesNavigation.allowRoomNavigation(target);
        }

        // Ga naar die pagina
        window.location.href = target;
    }

    // Functie om naar de vorige pagina te gaan
    function previousRoom() {
        // -1 = vorige pagina
        // + rooms.length = voorkomt negatieve index
        // % rooms.length = zorgt dat we naar het einde gaan als we op het begin zitten
        let prevIndex = (currentIndex - 1 + rooms.length) % rooms.length;
        const target = rooms[prevIndex];
        if (window.EduBytesNavigation && typeof window.EduBytesNavigation.allowRoomNavigation === 'function') {
            window.EduBytesNavigation.allowRoomNavigation(target);
        }

        // Ga naar die pagina
        window.location.href = target;
    }
</script>

</body>
</html>
