<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Desk Close-up - EduBytes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/rooms.css">
    <style>
        .room-background { 
            background-image: url('../assets/rooms/crime_scene_bureau_USB.png'); 
            pointer-events: none; /* Ensure background doesn't steal clicks */
        }
        .room-background.no-usb { 
            background-image: url('../assets/rooms/crime_scene_bureau.png') !important; 
        }
        
        #usb-hitbox {
            position: absolute;
            top: 75%; 
            left: 70%; 
            width: 15%; 
            height: 15%;
            cursor: pointer;
            z-index: 1000;
            /* background: rgba(255,0,0,0.2); */ /* DEBUG: Remove in production */
        }
    </style>
</head>
<body>
    <div class="room-background-ambient"></div>
    <div class="room-background"></div>
    <h1>Bureau</h1>
    
    <div class="interactable-layer">
        <div id="usb-hitbox" class="clickable-object" onclick="pickupUSB()" title="Take USB Stick"></div>
    </div>

    <!-- UI Buttons -->
    <button class="btn btn-primary ui-button position-fixed bottom-0 start-50 translate-middle-x mb-4" id="btn-bottom" onclick="goToLocation('crime_scene.html')"></button>

    <script src="../js/core/global_init.js"></script>
    <script src="../js/core/gamestate.js"></script>
    <script src="../js/core/routing.js"></script>
    <script src="../js/core/responsive.js"></script>
    <script src="../js/components/device_block.js"></script>
    <script src="../js/components/movement.js"></script>
    <script src="../js/components/audio.js"></script>
    <script src="../js/components/game_menu.js"></script>
    <script src="../js/components/tablet_widget.js"></script>
    <script src="../js/core/inventory.js"></script>
    <script src="../js/components/inventory_ui.js"></script>
    <script src="../js/data/dialogs.js"></script>
    <script src="../js/components/dialog.js"></script>
    <script src="../js/components/dynamic_loading.js"></script>
    <script>
        function updateRoomState() {
            const bg = document.querySelector('.room-background');
            const hitbox = document.getElementById('usb-hitbox');
            
            const hasUSB = window.Inventory && window.Inventory.hasItem('usb_stick');
            console.log("[Bureau] Updating room state. Has USB:", hasUSB);

            if (hasUSB) {
                bg.classList.add('no-usb');
                // Force a hard refresh of the background image to bypass any cache or rendering glitch
                const noUsbPath = '../assets/rooms/crime_scene_bureau.png';
                bg.style.backgroundImage = `url('${noUsbPath}')`;
                
                if (hitbox) {
                    hitbox.style.pointerEvents = 'none';
                    hitbox.style.display = 'none';
                }
                
                console.log("[Bureau] USB state applied: Image should now be WITHOUT USB.");
            } else {
                bg.classList.remove('no-usb');
                bg.style.backgroundImage = "url('../assets/rooms/crime_scene_bureau_USB.png')";
                if (hitbox) {
                    hitbox.style.pointerEvents = 'auto';
                    hitbox.style.display = 'block';
                }
            }

            // Sync ambient background
            if (window.ResponsiveScaler) {
                window.ResponsiveScaler.sync();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateRoomState();
            
            // Listen for global inventory updates in case it changes elsewhere
            window.addEventListener('inventoryUpdate', updateRoomState);
        });

        function pickupUSB() {
            console.log("[Bureau] Interaction: Attempting to pickup USB.");
            
            if (!window.Inventory) {
                console.error("[Bureau] Critical: Inventory service not found!");
                return;
            }

            if (window.Inventory.addItem('usb_stick')) {
                console.log("[Bureau] Success: USB added to inventory.");
                
                // Immediate visual feedback
                updateRoomState();

                // Play narrative confirmation
                if (window.DialogEngine) {
                    window.DialogEngine.playSequence([
                        { speaker: "Detective", text: "Got it. This encrypted drive should be the key to the registry data." },
                        { speaker: "Detective", text: "I'll need to import this into my tablet to see the actual logs." }
                    ]);
                } else if (window.showDialog) {
                    window.showDialog("You collected the USB Stick. Use the Detective Tablet to import the data.");
                }
            } else {
                console.warn("[Bureau] USB already collected or could not be added.");
            }
        }
    </script>
</body>
</html>
