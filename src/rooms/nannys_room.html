<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nanny's Room - EduBytes</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/rooms.css">
    <style>
        .room-background { background-image: url('../assets/rooms/nannys_room_main.png'); }
        #obj-window  { top: 36.8%; left: 46.1%; width: 7.8%; height: 24.5%; }
        #obj-bed     { top: 66.0%; left: 55.8%; width: 19.5%; height: 27.6%; }
        #obj-dresser { top: 70.5%; left: 81.9%; width: 9.1%; height: 27.6%; }
        #obj-cabinet { top: 59.8%; left: 12.2%; width: 14.3%; height: 36.7%; }
    </style>
</head>
<body>
    <div class="room-background-ambient"></div>
    <div class="room-background"></div>
    <h1>Nanny's Room</h1>

    <div class="interactable-layer">
        <div id="obj-window"  class="clickable-object" onclick="showInteraction('window')" title="Examine Window"></div>
        <div id="obj-bed"     class="clickable-object" onclick="showInteraction('bed')"    title="Examine Bed"></div>
        <div id="obj-dresser" class="clickable-object" onclick="showInteraction('dresser')" title="Examine Dresser"></div>
        <div id="obj-cabinet" class="clickable-object" onclick="showInteraction('cabinet')" title="Examine Cabinet"></div>
    </div>


    <div id="dialog-container"></div>

    <!-- Back to Living Room — per Interacties met locaties.docx -->
    <button class="btn btn-primary ui-button position-fixed bottom-0 start-50 translate-middle-x mb-3" id="btn-bottom" onclick="goToLocation('living_room.html')"></button>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.GameState) window.GameState.setFlag('nannys_room_visited');
        });
    </script>
    <script src="../js/core/global_init.js"></script>
    <script src="../js/core/gamestate.js"></script>
    <script src="../js/core/routing.js"></script>
    <script src="../js/core/responsive.js"></script>
    <script src="../js/components/device_block.js"></script>
    <script src="../js/components/movement.js"></script>
    <script src="../js/components/audio.js"></script>
    <script src="../js/components/game_menu.js"></script>
    <script src="../js/components/tablet_widget.js"></script>
    <script src="../js/core/inventory.js"></script>
    <script src="../js/components/inventory_ui.js"></script>
    <script src="../js/data/dialogs.js"></script>
    <script src="../js/components/dialog.js"></script>
    <script src="../js/components/dynamic_loading.js"></script>
</body>
</html>
